name: Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to deploy (e.g. 0.70.1 or sha-abcdef)'
        required: true
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Configure AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          mkdir -p ~/.aws
          # Write credentials with restrictive permissions (600 = owner read/write only)
          {
            echo "[default]"
            echo "aws_access_key_id = ${AWS_ACCESS_KEY_ID}"
            echo "aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}"
          } > ~/.aws/credentials
          chmod 600 ~/.aws/credentials
          
          {
            echo "[default]"
            echo "region = ${AWS_REGION}"
          } > ~/.aws/config
          chmod 600 ~/.aws/config

      - name: Detect architecture
        id: arch
        run: |
          ARCH=$(uname -m)
          echo "ARCH=${ARCH}" >> $GITHUB_OUTPUT
          echo "Detected architecture: ${ARCH}"

      - name: Install AWS CLI (if not already installed)
        run: |
          # Check if AWS CLI is already installed
          if command -v aws &> /dev/null; then
            echo "AWS CLI is already installed, using existing installation..."
            aws --version
          else
            echo "AWS CLI not found, installing..."
            ARCH="${{ steps.arch.outputs.ARCH }}"
            if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
              curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
            else
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            fi
            unzip awscliv2.zip
            sudo ./aws/install
            aws --version
          fi

      - name: Install AWS Session Manager plugin (if not already installed)
        run: |
          # Check if Session Manager plugin is already installed
          if command -v session-manager-plugin &> /dev/null; then
            echo "Session Manager plugin is already installed, using existing installation..."
            session-manager-plugin --version
          else
            echo "Session Manager plugin not found, installing..."
            ARCH="${{ steps.arch.outputs.ARCH }}"
            if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
              curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_arm64/session-manager-plugin.deb" -o "/tmp/session-manager-plugin.deb"
            else
              curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "/tmp/session-manager-plugin.deb"
            fi
            sudo dpkg -i /tmp/session-manager-plugin.deb
            session-manager-plugin --version
          fi

      - name: Execute commands via SSM
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SSM_TARGET: ${{ secrets.SSM_TARGET }}
        run: |
          # Execute commands on the remote instance
          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${SSM_TARGET}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo su ubuntu -c \"cd ~/docmost && sudo IMAGE_TAG=${{ github.event.inputs.version }} docker compose pull && sudo IMAGE_TAG=${{ github.event.inputs.version }} docker compose up -d\""]' \
            --output text \
            --query "Command.CommandId")
          
          echo "Command ID: ${COMMAND_ID}"
          
          # Wait for command to complete
          echo "Waiting for command to complete..."
          aws ssm wait command-executed \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${SSM_TARGET}" || true
          
          # Get command output
          echo "Command output:"
          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${SSM_TARGET}" \
            --query "StandardOutputContent" \
            --output text
          
          # Check exit status
          EXIT_CODE=$(aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${SSM_TARGET}" \
            --query "ResponseCode" \
            --output text)
          
          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Command failed with exit code: ${EXIT_CODE}"
            aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --instance-id "${SSM_TARGET}" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          
          echo "Command completed successfully!"

      - name: Notify Chatwoot
        if: success()
        env:
          CHATWOOT_URL: ${{ vars.CHATWOOT_URL }}
          CHATWOOT_INBOX_TOKEN: ${{ secrets.CHATWOOT_INBOX_TOKEN }}
          CHATWOOT_EMAIL: ${{ vars.CHATWOOT_EMAIL }}
        run: |
          # 1. Create/Identify a contact to get a source_id
          CONTACT_RESP=$(curl -s -X POST "${CHATWOOT_URL}/public/api/v1/inboxes/${CHATWOOT_INBOX_TOKEN}/contacts" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"GHA Deploy Bot\", \"email\": \"${CHATWOOT_EMAIL}\", \"custom_attributes\": {\"repo\": \"${{ github.repository }}\"}}")
          
          SOURCE_ID=$(echo $CONTACT_RESP | jq -r '.source_id')
          
          if [ -z "$SOURCE_ID" ] || [ "$SOURCE_ID" == "null" ]; then
            echo "Error: Failed to get Chatwoot Source ID. Response: $CONTACT_RESP"
            exit 0 # Don't fail the whole deploy for a notification error
          fi
          
          # 2. Create or find a conversation
          CONV_RESP=$(curl -s -X POST "${CHATWOOT_URL}/public/api/v1/inboxes/${CHATWOOT_INBOX_TOKEN}/contacts/${SOURCE_ID}/conversations" \
            -H "Content-Type: application/json")
          
          CONV_ID=$(echo $CONV_RESP | jq -r '.id')
          
          if [ -z "$CONV_ID" ] || [ "$CONV_ID" == "null" ]; then
             # Try to see if there is an existing conversation
             CONV_ID=$(echo $CONV_RESP | jq -r '.[0].id')
          fi
          
          if [ -z "$CONV_ID" ] || [ "$CONV_ID" == "null" ]; then
            echo "Error: Failed to get Chatwoot Conversation ID. Response: $CONV_RESP"
            exit 0
          fi
          
          # 3. Send the success message
          MESSAGE="🚀 *Deployment Success!*
          *Project:* Docmost
          *Repository:* ${{ github.repository }}
          *Version:* ${{ github.event.inputs.version }}
          *Trigger:* Manual Deploy"
          
          curl -s -X POST "${CHATWOOT_URL}/public/api/v1/inboxes/${CHATWOOT_INBOX_TOKEN}/contacts/${SOURCE_ID}/conversations/${CONV_ID}/messages" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MESSAGE\"}"
          
          echo "Chatwoot notification sent!"
      
      - name: Cleanup AWS credentials
        if: always()
        run: |
          # Remove credential files for security (runner is ephemeral, but good practice)
          rm -f ~/.aws/credentials ~/.aws/config
          echo "Credentials cleaned up"

